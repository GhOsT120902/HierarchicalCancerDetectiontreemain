<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MedAI Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head> index.html
<body>
  
  <div class="auth-container">
    <div class="auth-card glass">
      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        MedAI
      </div>
      <p class="auth-subtitle">Intelligent scan analysis powered by deep learning.</p>
      
      <form id="loginForm" class="auth-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="input-field" placeholder="doc@medai.com" required>
        </div>
        
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input-field" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Sign In Target System
        </button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
